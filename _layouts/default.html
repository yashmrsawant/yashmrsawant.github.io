<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Merriweather:wght@300;700&display=swap" rel="stylesheet">

    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* Color Variables (Light Mode Default) */
        :root {
            --bg-color: #fafafa;
            --text-color: #333333;
            --link-color: #2563eb;
            --header-bg: #ffffff;
            --border-color: #e5e7eb;
            --code-bg: rgba(0, 0, 0, 0.05);
        }

        /* Automatic Dark Mode */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #e5e5e5;
                --link-color: #60a5fa;
                --header-bg: #1e1e1e;
                --border-color: #333333;
                --code-bg: rgba(255, 255, 255, 0.1);
            }
        }

        /* Base Typography & Layout */
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.8;
            margin: 0;
            padding: 0;
            font-size: 18px;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Merriweather', serif;
            color: var(--text-color);
            margin-top: 2em;
            margin-bottom: 0.5em;
            line-height: 1.3;
        }

        a {
            color: var(--link-color);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-bottom 0.2s ease;
        }

        a:hover {
            border-bottom: 1px solid var(--link-color);
        }

        /* Header Styling */
        header {
            background-color: var(--header-bg);
            padding: 3rem 0;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            margin-top: 0;
        }

        header h1 a {
            color: var(--text-color);
            border: none;
        }

        /* Main Content Container */
        main {
            max-width: 760px;
            margin: 0 auto;
            padding: 0 20px 60px 20px;
        }

        /* Code Blocks & Quotes */
        code {
            background-color: var(--code-bg);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-family: Menlo, Monaco, Consolas, monospace;
            font-size: 0.85em;
        }

        pre {
            background-color: var(--code-bg);
            padding: 1.2rem;
            border-radius: 8px;
            overflow-x: auto;
        }

        pre code {
            background-color: transparent;
            padding: 0;
        }

        blockquote {
            border-left: 4px solid var(--link-color);
            margin: 1.5rem 0;
            padding-left: 1rem;
            font-style: italic;
            opacity: 0.8;
        }

        /* Ensure math equations don't break mobile layouts */
        mjx-container {
            overflow-x: auto;
            overflow-y: hidden;
            max-width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1><a href="/">{{ site.title | default: "Yash M Sawant" }}</a></h1>
    </header>
    <main>
        {{ content }}
    </main>
</body>
</html>
