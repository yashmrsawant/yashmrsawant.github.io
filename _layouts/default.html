<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>

    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* GitHub Primer Light Theme Colors */
        :root {
            --bg-color: #ffffff;
            --text-color: #1f2328;
            --text-muted: #656d76;
            --link-color: #0969da;
            --border-color: #d0d7de;
            --header-bg: #f6f8fa;
            --code-bg: #f6f8fa;
            --inline-code-bg: rgba(175, 184, 193, 0.2);
            --blockquote-border: #d0d7de;
        }

        /* GitHub System Font Stack */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            margin: 0;
            padding: 0;
            font-size: 16px;
            word-wrap: break-word;
        }

        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
        }

        /* Signature GitHub header underlining */
        h1 { font-size: 2em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border-color); }
        h2 { font-size: 1.5em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border-color); }
        h3 { font-size: 1.25em; }

        a {
            color: var(--link-color);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        p {
            margin-top: 0;
            margin-bottom: 16px;
        }

        /* Header / Navigation */
        header {
            background-color: var(--header-bg);
            padding: 16px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 32px;
        }

        .header-container {
            max-width: 1012px;
            margin: 0 auto;
            padding: 0 16px;
            display: flex;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 18px;
            border-bottom: none;
            padding-bottom: 0;
        }

        header a {
            color: var(--text-color);
            font-weight: 600;
        }

        header a:hover {
            color: var(--link-color);
            text-decoration: none;
        }

        /* Main Content Container */
        main {
            max-width: 880px;
            margin: 0 auto;
            padding: 0 16px 64px 16px;
        }

        /* Code Blocks & Quotes */
        code {
            padding: 0.2em 0.4em;
            margin: 0;
            font-size: 85%;
            background-color: var(--inline-code-bg);
            border-radius: 6px;
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
        }

        pre {
            padding: 16px;
            overflow: auto;
            font-size: 85%;
            line-height: 1.45;
            background-color: var(--code-bg);
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        pre code {
            padding: 0;
            background-color: transparent;
            border: 0;
            border-radius: 0;
        }

        blockquote {
            padding: 0 1em;
            color: var(--text-muted);
            border-left: 0.25em solid var(--blockquote-border);
            margin: 0 0 16px 0;
        }

        hr {
            height: 0.25em;
            padding: 0;
            margin: 24px 0;
            background-color: var(--border-color);
            border: 0;
        }

        /* MathJax Mobile Fix */
        mjx-container {
            overflow-x: auto;
            overflow-y: hidden;
            max-width: 100%;
        }

        /* Responsive Layout */
        @media (max-width: 767px) {
            main { padding: 0 16px 32px 16px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <h1><a href="/">{{ site.title | default: "Yash M Sawant" }}</a></h1>
        </div>
    </header>
    <main>
        {{ content }}
    </main>
</body>
</html>
